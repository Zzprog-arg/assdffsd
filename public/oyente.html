<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oyente</title>
</head>
<body>
  <h1>Oyente</h1>
  <button id="activarBtn">Activar audio</button>
  <p id="estado">Esperando transmisión...</p>
  <audio id="remoteAudio" controls autoplay playsinline></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.emit("join-role", "oyente");

    const audio = document.getElementById("remoteAudio");
    const estado = document.getElementById("estado");

    let pc = null;
    let audioActivado = false;
    let emisorId = null;

    const config = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
      ]
    };

    document.getElementById("activarBtn").onclick = async () => {
      try {
        audioActivado = true;
        await audio.play().catch(() => {});
        estado.textContent = "Audio activado. Esperando transmisión...";
      } catch (err) {
        console.error(err);
      }
    };

    socket.on("offer", async ({ fromId, offer }) => {
      try {
        emisorId = fromId;
        estado.textContent = "Oferta recibida...";

        if (pc) {
          pc.close();
          pc = null;
        }

        pc = new RTCPeerConnection(config);

        pc.ontrack = async (event) => {
          try {
            audio.srcObject = event.streams[0];
            estado.textContent = "Audio recibido";

            if (audioActivado) {
              await audio.play().catch(() => {});
            } else {
              estado.textContent = "Tocá Activar audio";
            }
          } catch (err) {
            console.error("Error ontrack:", err);
          }
        };

        pc.onicecandidate = (event) => {
          if (event.candidate && emisorId) {
            socket.emit("ice-candidate", {
              targetId: emisorId,
              candidate: event.candidate
            });
          }
        };

        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("answer", {
          targetId: emisorId,
          answer
        });
      } catch (err) {
        console.error("Error en offer:", err);
        estado.textContent = "Error: " + err.message;
      }
    });

    socket.on("ice-candidate", async ({ fromId, candidate }) => {
      try {
        if (!pc || fromId !== emisorId) return;
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (err) {
        console.error("Error ICE:", err);
      }
    });
  </script>
</body>
</html>
