<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensajes de oyentes</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #16304f;
      background:
        radial-gradient(circle at top left, rgba(74, 163, 255, 0.18), transparent 30%),
        linear-gradient(180deg, #eef7ff 0%, #d8ecfb 100%);
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    .hero {
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #dff0ff;
      color: #0f6fb1;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .desc {
      margin: 0;
      color: #4e627c;
      line-height: 1.6;
    }

    .panel {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(20, 62, 109, 0.12);
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .status {
      margin-bottom: 16px;
      color: #4e627c;
      font-size: 14px;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .empty {
      padding: 26px 18px;
      border-radius: 18px;
      background: #f3f8fd;
      color: #59708c;
      text-align: center;
    }

    .message {
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f5fbff 100%);
      border: 1px solid #d8e9f7;
      box-shadow: 0 10px 24px rgba(24, 87, 144, 0.08);
    }

    .message-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 999px;
      background: #dff0ff;
      color: #0c6ba9;
      font-weight: bold;
      font-size: 13px;
    }

    .time {
      color: #6b8097;
      font-size: 13px;
    }

    .text {
      white-space: pre-wrap;
      line-height: 1.6;
      color: #17324d;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="eyebrow">Mensajes en vivo</div>
      <h1>Mensajes de oyentes</h1>
      <p class="desc">
        Esta pantalla recibe los mensajes al instante. No hace falta actualizar para ver nuevos envíos.
      </p>
    </div>

    <div class="panel">
      <p id="status" class="status">Conectando con la bandeja de mensajes...</p>
      <div id="list" class="list">
        <div id="empty" class="empty">Todavía no hay mensajes.</div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const status = document.getElementById("status");
    const list = document.getElementById("list");
    const empty = document.getElementById("empty");

    function formatTime(value) {
      const date = new Date(value);
      return date.toLocaleString("es-AR");
    }

    function ensureEmptyState() {
      empty.style.display = list.querySelector(".message") ? "none" : "block";
    }

    function renderMessage(message, prepend = false) {
      const item = document.createElement("article");
      item.className = "message";
      item.innerHTML = `
        <div class="message-head">
          <span class="badge">${message.listenerId}</span>
          <span class="time">${formatTime(message.createdAt)}</span>
        </div>
        <div class="text"></div>
      `;

      item.querySelector(".text").textContent = message.text;

      if (prepend) {
        list.insertBefore(item, list.firstChild);
      } else {
        list.appendChild(item);
      }

      ensureEmptyState();
    }

    async function loadMessages() {
      try {
        const response = await fetch("/api/messages");
        const data = await response.json();
        const messages = Array.isArray(data.messages) ? data.messages : [];

        messages.forEach((message) => renderMessage(message, false));
        status.textContent = "Bandeja conectada en tiempo real.";
        ensureEmptyState();
      } catch (error) {
        console.error("Error cargando mensajes:", error);
        status.textContent = "No se pudieron cargar los mensajes.";
      }
    }

    socket.on("connect", () => {
      status.textContent = "Bandeja conectada en tiempo real.";
    });

    socket.on("new-listener-message", (message) => {
      renderMessage(message, true);
      status.textContent = "Nuevo mensaje recibido.";
    });

    loadMessages();
  </script>
</body>
</html>
