<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emisor</title>
</head>
<body>
  <h1>Emisor de audio</h1>
  <button id="startBtn">Iniciar transmisión</button>
  <p id="estado">Esperando...</p>
  <p id="tiempo">00:00</p>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.emit("join-role", "emisor");

    const estado = document.getElementById("estado");
    const tiempo = document.getElementById("tiempo");

    let localStream = null;
    let startedAt = null;
    let timer = null;

    const peers = new Map();

    const config = {
      iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
      ]
    };

    function startTimer() {
      if (timer) clearInterval(timer);
      startedAt = Date.now();

      timer = setInterval(() => {
        const diff = Math.floor((Date.now() - startedAt) / 1000);
        const mm = String(Math.floor(diff / 60)).padStart(2, "0");
        const ss = String(diff % 60).padStart(2, "0");
        tiempo.textContent = `${mm}:${ss}`;
      }, 1000);
    }

    async function createPeer(listenerId) {
      const pc = new RTCPeerConnection(config);

      localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
      });

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit("ice-candidate", {
            targetId: listenerId,
            candidate: event.candidate
          });
        }
      };

      peers.set(listenerId, pc);

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      socket.emit("offer", {
        targetId: listenerId,
        offer
      });

      return pc;
    }

    document.getElementById("startBtn").onclick = async () => {
      try {
        estado.textContent = "Pidiendo micrófono...";
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: false
        });

        estado.textContent = "Transmitiendo...";
        startTimer();
      } catch (err) {
        console.error(err);
        estado.textContent = "Error: " + err.message;
      }
    };

    socket.on("listener-joined", async ({ listenerId }) => {
      try {
        if (!localStream) return;
        estado.textContent = "Oyente conectado, enviando audio...";
        await createPeer(listenerId);
      } catch (err) {
        console.error("Error creando peer:", err);
      }
    });

    socket.on("answer", async ({ fromId, answer }) => {
      try {
        const pc = peers.get(fromId);
        if (!pc) return;

        if (pc.signalingState !== "have-local-offer") {
          console.warn("Se ignoró answer en estado:", pc.signalingState);
          return;
        }

        await pc.setRemoteDescription(new RTCSessionDescription(answer));
      } catch (err) {
        console.error("Error answer:", err);
      }
    });

    socket.on("ice-candidate", async ({ fromId, candidate }) => {
      try {
        const pc = peers.get(fromId);
        if (!pc) return;
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      } catch (err) {
        console.error("Error ICE:", err);
      }
    });
  </script>
</body>
</html>
